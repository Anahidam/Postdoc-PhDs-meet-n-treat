<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meet & Treat — Biology Dept RSVP</title>
<style>
  :root{
    --paper:#f7f5ee;
    --ink:#1f2d24;
    --ink-soft:#4a5a4f;
    --line:#c9cdb8;
    --agar:#d8a63f;
    --agar-dark:#a97e26;
    --petri:#5c7a63;
    --petri-light:#e4ede2;
    --error:#b5493c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 28px 28px;
    background-position: -1px -1px;
    color:var(--ink);
    font-family: 'Courier New', Consolas, monospace;
    display:flex;
    justify-content:center;
    padding: 32px 16px 80px;
  }
  .sheet{
    width:100%;
    max-width:560px;
    background: #fffdf7;
    border:1px solid var(--line);
    box-shadow: 6px 6px 0 rgba(31,45,36,0.08);
  }
  .tape{
    position:relative;
    top:-14px;
    left:24px;
    display:inline-block;
    background: var(--agar);
    color:#3a2a08;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    padding:5px 12px;
    transform: rotate(-2deg);
    box-shadow: 2px 2px 0 rgba(0,0,0,0.08);
  }
  header{ padding: 6px 32px 20px; border-bottom: 2px solid var(--ink); }
  h1{
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 30px;
    margin: 6px 0 6px;
    line-height:1.15;
  }
  .subtitle{ color:var(--ink-soft); font-size:14px; margin:0 0 4px; }
  .meta{ font-size:13px; color:var(--ink-soft); margin-top:10px; }
  .meta strong{ color:var(--ink); }

  form{ padding: 24px 32px 32px; }

  .field{ margin-bottom: 26px; }
  label.q{
    display:block;
    font-family: Georgia, serif;
    font-size:16px;
    margin-bottom:10px;
  }
  .q .num{ color: var(--petri); margin-right:6px; }
  input[type=text]{
    width:100%;
    padding:10px 12px;
    font-family: inherit;
    font-size:14px;
    border:1px solid var(--ink);
    background:var(--petri-light);
    color:var(--ink);
  }
  input[type=text]:focus{ outline:2px solid var(--petri); outline-offset:1px; }

  .btn-row{ display:flex; gap:10px; flex-wrap:wrap; }
  .choice{
    flex:1;
    min-width:120px;
    padding:12px 14px;
    border:1px solid var(--ink);
    background:#fff;
    font-family:inherit;
    font-size:14px;
    cursor:pointer;
    transition: transform .08s ease;
    text-align:center;
  }
  .choice:hover{ transform: translateY(-1px); }
  .choice.selected{
    background: var(--petri);
    color:#fff;
    border-color: var(--petri);
  }
  .choice.selected.agar{
    background: var(--agar-dark);
    border-color: var(--agar-dark);
  }

  .hidden{ display:none; }

  .submit-btn{
    width:100%;
    padding:14px;
    background:var(--ink);
    color:#fff;
    border:none;
    font-family:inherit;
    font-size:15px;
    letter-spacing:.04em;
    cursor:pointer;
    text-transform:uppercase;
  }
  .submit-btn:disabled{ opacity:.5; cursor:not-allowed; }
  .submit-btn:hover:not(:disabled){ background: var(--petri); }

  .status{
    margin-top:16px;
    font-size:13px;
    text-align:center;
  }
  .status.err{ color:var(--error); }
  .status.ok{ color:var(--petri); }

  .success-screen{
    padding: 60px 32px;
    text-align:center;
  }
  .success-screen .stamp{
    display:inline-block;
    border:3px solid var(--petri);
    color:var(--petri);
    padding:10px 18px;
    transform:rotate(-4deg);
    font-family: Georgia, serif;
    font-size:20px;
    text-transform:uppercase;
    letter-spacing:.08em;
    margin-bottom:16px;
  }
  .success-screen p{ color:var(--ink-soft); font-size:14px; line-height:1.6; }
</style>
</head>
<body>

<div class="sheet">
  <div class="tape">RSVP · reply by request</div>
  <header>
    <h1>Meet &amp; Treat</h1>
    <p class="subtitle">Biology Department — Postdocs &amp; PhD Students</p>
    <div class="meta">
      <div><strong>When:</strong> <span id="event-date">[date/time — edit below]</span></div>
      <div><strong>Where:</strong> <span id="event-loc">[location — edit below]</span></div>
    </div>
  </header>

  <form id="rsvpForm">
    <div class="field">
      <label class="q"><span class="num">1.</span> Your initials</label>
      <input type="text" id="initials" placeholder="e.g. S.A." maxlength="6" required>
    </div>

    <div class="field">
      <label class="q"><span class="num">2.</span> Will you attend?</label>
      <div class="btn-row" id="attendingRow">
        <button type="button" class="choice" data-value="Yes">Yes, I'll be there</button>
        <button type="button" class="choice" data-value="No">Can't make it</button>
      </div>
    </div>

    <div class="field hidden" id="dishQuestion">
      <label class="q"><span class="num">3.</span> Bringing a dish to share?</label>
      <div class="btn-row" id="dishRow">
        <button type="button" class="choice agar-choice" data-value="Homeland dish">Yes — a dish from home</button>
        <button type="button" class="choice agar-choice" data-value="Other dish">Yes — something else</button>
        <button type="button" class="choice agar-choice" data-value="No">Not this time</button>
      </div>
    </div>

    <div class="field hidden" id="dishNameField">
      <label class="q"><span class="num">4.</span> What's the dish called?</label>
      <input type="text" id="dishName" placeholder="e.g. Koshari, Kimchi jjigae, Baklava">
    </div>

    <div class="field hidden" id="dietaryField">
      <label class="q"><span class="num">5.</span> Any allergens or dietary notes? <span style="font-weight:normal;color:var(--ink-soft)">(optional)</span></label>
      <input type="text" id="dietaryNotes" placeholder="e.g. contains nuts, vegetarian">
    </div>

    <button type="submit" class="submit-btn" id="submitBtn" disabled>Submit RSVP</button>
    <div class="status" id="statusMsg"></div>
  </form>

  <div class="success-screen hidden" id="successScreen">
    <div class="stamp">Logged ✓</div>
    <p>Thanks — your response has been recorded.<br>See you at the table.</p>
  </div>
</div>

<script>
  // === CONFIGURE THIS ===
  // Paste the Web App URL you get after deploying Code.gs
  const SCRIPT_URL = "PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE";

  // Optional: set the real date/location shown at the top
  document.getElementById('event-date').textContent = "July 31, 2026 — 1:00 to 2:30 PM";
  document.getElementById('event-loc').textContent = "TU Darmstadt, Biology Dept. B2|03, Room 242  ";

  const state = { initials:'', attending:'', bringingDish:'', dishName:'', dietaryNotes:'' };

  function selectChoice(row, btn, key){
    row.querySelectorAll('.choice').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    state[key] = btn.dataset.value;
  }

  const attendingRow = document.getElementById('attendingRow');
  attendingRow.querySelectorAll('.choice').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      selectChoice(attendingRow, btn, 'attending');
      const dishQ = document.getElementById('dishQuestion');
      if(state.attending === 'Yes'){
        dishQ.classList.remove('hidden');
      } else {
        dishQ.classList.add('hidden');
        document.getElementById('dishNameField').classList.add('hidden');
        document.getElementById('dietaryField').classList.add('hidden');
        state.bringingDish = ''; state.dishName=''; state.dietaryNotes='';
      }
      validate();
    });
  });

  const dishRow = document.getElementById('dishRow');
  dishRow.querySelectorAll('.choice').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      selectChoice(dishRow, btn, 'bringingDish');
      const nameField = document.getElementById('dishNameField');
      const dietField = document.getElementById('dietaryField');
      if(state.bringingDish !== 'No'){
        nameField.classList.remove('hidden');
        dietField.classList.remove('hidden');
      } else {
        nameField.classList.add('hidden');
        dietField.classList.add('hidden');
      }
      validate();
    });
  });

  document.getElementById('initials').addEventListener('input', e=>{
    state.initials = e.target.value.trim();
    validate();
  });
  document.getElementById('dishName').addEventListener('input', e=> state.dishName = e.target.value.trim());
  document.getElementById('dietaryNotes').addEventListener('input', e=> state.dietaryNotes = e.target.value.trim());

  function validate(){
    let ok = state.initials.length > 0 && state.attending.length > 0;
    if(state.attending === 'Yes'){
      ok = ok && state.bringingDish.length > 0;
    }
    document.getElementById('submitBtn').disabled = !ok;
  }

  document.getElementById('rsvpForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const statusEl = document.getElementById('statusMsg');
    btn.disabled = true;
    btn.textContent = 'Submitting...';
    statusEl.textContent = '';
    statusEl.className = 'status';

    try{
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // avoids CORS preflight
        body: JSON.stringify(state)
      });
      const data = await res.json();
      if(data.result === 'success'){
        document.getElementById('rsvpForm').classList.add('hidden');
        document.getElementById('successScreen').classList.remove('hidden');
      } else {
        throw new Error('Unexpected response');
      }
    } catch(err){
      statusEl.textContent = "Couldn't submit — check your connection and try again.";
      statusEl.className = 'status err';
      btn.disabled = false;
      btn.textContent = 'Submit RSVP';
    }
  });
</script>

</body>
</html>
